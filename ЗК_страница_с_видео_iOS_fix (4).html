<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    background: #060402;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .poster {
    position: relative;
    width: 100vw;
    max-width: 480px;
    height: calc(100vw * 1500 / 844);
    max-height: calc(480px * 1500 / 844);
  }
  /* Видео — нижний слой, точно в дырку */
  .video-wrap {
    position: absolute;
    left: 6.99%;
    top: 43.40%;
    width: 85.90%;
    height: 28.93%;
    overflow: hidden;
    background: #000;
    z-index: 1;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* После запуска чуть расширяем iframe-зону под 16:9,
     чтобы Kinescope не давал черные поля сверху/снизу.
     Лишнее остается спрятано под рамкой. */
  .video-wrap.playing {
    left: 4.35%;
    width: 91.30%;
  }

  .play-btn {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    cursor: pointer;
    background: transparent;
    transition: opacity 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .play-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(0,0,0,0.82);
    border: 2px solid rgba(201,146,58,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px rgba(0,0,0,0.6);
    transition: transform 0.15s ease;
  }
  .play-btn:active .play-circle { transform: scale(0.92); }
  .play-triangle {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 12px 0 12px 22px;
    border-color: transparent transparent transparent #c9923a;
    margin-left: 4px;
  }

  /* Прозрачная кликабельная область под видео — ведет в VK */
  .bottom-vk-link {
    position: absolute;
    left: 0;
    top: 72.33%;
    width: 100%;
    height: 27.67%;
    z-index: 4;
    display: block;
    background: transparent;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    -webkit-touch-callout: none;
    user-select: none;
    outline: none;
    touch-action: manipulation;
  }

    iframe.setAttribute('playsinline', '');
    iframe.setAttribute('webkit-playsinline', '');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-top-navigation-by-user-activation');
    iframe.style.position = 'absolute';
    iframe.style.top = '0';
    iframe.style.left = '0';
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';

    wrap.insertBefore(iframe, wrap.firstChild);
  }
</script>
